<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Dragon Warrior</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
}

h1{
    color:#f6c343;
    margin-bottom:30px;
    text-shadow:0 0 15px rgba(246,195,67,0.7);
}

button{
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:linear-gradient(45deg,#f6c343,#ff9800);
    color:black;
    font-weight:bold;
    box-shadow:0 0 20px rgba(255,152,0,0.6);
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}
#page2{
    display:none;
    width:100%;
    height:100vh;
}


</style>
</head>

<body>

<div class="container" id="page1">
    <h1>The Dragon Warrior wants to show you something.</h1>
    <button onclick="showGif()">Continue</button>
</div>

<div id="page2">
    <img src="kung-fu-panda-po.gif" 
         style="width:100%;height:100vh;object-fit:cover;">
</div>

<script>
function showGif(){
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="block";
}
</script>

</body>
</html>
